<div class="login-card">
  <header class="login-card__header">
    <div class="login-card__logo" aria-hidden="true">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/>
        <path d="M7 2v20"/>
        <path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/>
      </svg>
    </div>
    <h1 class="login-card__title">Caucasia POS</h1>
    <p class="login-card__subtitle">
      Bienvenido de nuevo, por favor ingresa tus credenciales.
    </p>
  </header>

  <form class="login-card__form" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
    <app-input
      label="Correo electrónico"
      type="email"
      placeholder="Usuario"
      prefixIcon="email"
      autocomplete="email"
      formControlName="email"
      [error]="emailError"
    ></app-input>

    <app-input
      label="Contraseña"
      type="password"
      placeholder="••••••••"
      prefixIcon="lock"
      suffixIcon="eye"
      autocomplete="current-password"
      formControlName="password"
      [error]="passwordError"
    ></app-input>

    <p *ngIf="errorMessage" class="login-card__error" role="alert">
      {{ errorMessage }}
    </p>

    <app-button
      type="submit"
      variant="primary"
      size="lg"
      [fullWidth]="true"
      [loading]="loading"
    >
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
        <polyline points="10 17 15 12 10 7"/>
        <line x1="15" y1="12" x2="3" y2="12"/>
      </svg>
      Iniciar Sesión
    </app-button>
  </form>
</div>
