<div class="login-card">
  <header class="login-card__header">
    <div class="login-card__logo" aria-hidden="true">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
        <path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/>
        <path d="M7 2v20"/>
        <path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/>
      </svg>
    </div>
    <h1 class="login-card__title">Conexión POS</h1>
    <p class="login-card__subtitle">
      Accede con tranquilidad. Tu información está protegida.
    </p>
  </header>

  <form class="login-card__form" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
    <app-input
      label="Correo electrónico"
      type="email"
      placeholder="Usuario"
      prefixIcon="user"
      autocomplete="email"
      formControlName="email"
      [error]="emailError"
    ></app-input>

    <app-input
      label="Contraseña"
      type="password"
      placeholder="Contraseña"
      prefixIcon="lock"
      suffixIcon="eye"
      autocomplete="current-password"
      formControlName="password"
      [error]="passwordError"
    ></app-input>

    <p *ngIf="errorMessage" class="login-card__error" role="alert">
      {{ errorMessage }}
    </p>

    <app-button
      type="submit"
      variant="primary"
      size="lg"
      [fullWidth]="true"
      [loading]="loading">
      Iniciar sesión
    </app-button>
  </form>
</div>
