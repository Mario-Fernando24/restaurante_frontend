<div class="input-field" [class.input-field--error]="!!error" [class.input-field--disabled]="disabled">
  <label *ngIf="label" class="input-field__label" [for]="id">{{ label }}</label>

  <div class="input-field__wrapper">
    <span *ngIf="prefixIcon" class="input-field__icon input-field__icon--prefix">
      <svg *ngIf="prefixIcon === 'email'" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="4" width="20" height="16" rx="2"/>
        <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
      </svg>
      <svg *ngIf="prefixIcon === 'lock'" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      <svg *ngIf="prefixIcon === 'user'" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <svg *ngIf="prefixIcon === 'search'" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <path d="m21 21-4.3-4.3"/>
      </svg>
    </span>

    <input
      class="input-field__input"
      [class.input-field__input--with-prefix]="!!prefixIcon"
      [class.input-field__input--with-suffix]="!!effectiveSuffixIcon"
      [id]="id"
      [type]="inputType"
      [placeholder]="placeholder"
      [disabled]="disabled"
      [autocomplete]="autocomplete"
      [value]="value"
      (input)="onInput($event)"
      (blur)="onBlur()"
    />

    <button
      *ngIf="effectiveSuffixIcon"
      type="button"
      class="input-field__icon input-field__icon--suffix"
      [attr.aria-label]="showPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'"
      (click)="onSuffixClick()"
    >
      <svg *ngIf="effectiveSuffixIcon === 'eye'" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
      <svg *ngIf="effectiveSuffixIcon === 'eye-off'" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/>
        <path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/>
        <path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/>
        <line x1="2" y1="2" x2="22" y2="22"/>
      </svg>
    </button>
  </div>

  <p *ngIf="error" class="input-field__error">{{ error }}</p>
  <p *ngIf="hint && !error" class="input-field__hint">{{ hint }}</p>
</div>
