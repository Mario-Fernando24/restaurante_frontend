<div
  *ngIf="visible && config"
  class="confirm-overlay"
  (click)="onBackdropClick($event)"
  aria-modal="true"
  role="dialog"
>
  <div class="confirm-dialog" [ngClass]="'confirm-dialog--' + config.variant">
    <div class="confirm-dialog__icon" [ngClass]="'confirm-dialog__icon--' + config.icon">
      <ng-container [ngSwitch]="config.icon">
        <svg *ngSwitchCase="'question'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
          <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
        <svg *ngSwitchCase="'warning'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
          <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
        <svg *ngSwitchCase="'info'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>
        </svg>
        <svg *ngSwitchCase="'success'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
        <svg *ngSwitchCase="'danger'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
        </svg>
      </ng-container>
    </div>

    <h2 class="confirm-dialog__title">{{ config.title }}</h2>
    <p class="confirm-dialog__message">{{ config.message }}</p>

    <div class="confirm-dialog__actions">
      <button type="button" class="confirm-dialog__btn confirm-dialog__btn--cancel" (click)="onCancel()">
        {{ config.cancelText }}
      </button>
      <button
        type="button"
        class="confirm-dialog__btn confirm-dialog__btn--confirm"
        [ngClass]="'confirm-dialog__btn--' + config.variant"
        (click)="onConfirm()"
      >
        {{ config.confirmText }}
      </button>
    </div>
  </div>
</div>
