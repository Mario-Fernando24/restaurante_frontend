<div class="shell" [class.shell--admin]="isAdmin">
  <div
    class="shell__backdrop"
    [class.shell__backdrop--visible]="sidebarOpen"
    (click)="closeSidebar()"
  ></div>

  <app-sidebar
    [navItems]="navItems"
    [roleLabel]="roleLabel"
    [isAdmin]="isAdmin"
    [open]="sidebarOpen"
    (logoutClick)="logout()"
    (closeMenu)="closeSidebar()"
  ></app-sidebar>

  <div class="shell__body">
    <header class="topbar" [class.topbar--admin]="isAdmin">
      <div class="topbar__left">
        <button
          type="button"
          class="topbar__menu-btn"
          aria-label="Abrir menú"
          (click)="toggleSidebar()"
        >
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>

        <ng-container *ngIf="isAdmin; else cajeroWelcome">
          <div class="topbar__search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
            <input type="search" placeholder="Buscar transacción..." aria-label="Buscar transacción" />
          </div>
        </ng-container>

        <ng-template #cajeroWelcome>
          <div class="topbar__welcome">
            <h1>Hola, {{ userName }}</h1>
            <span class="topbar__role">{{ userRole }}</span>
          </div>
        </ng-template>
      </div>

      <div class="topbar__right">
        <ng-container *ngIf="isAdmin">
          <button type="button" class="topbar__cta">+ Nueva Venta</button>

          <button type="button" class="topbar__icon-btn" aria-label="Notificaciones">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
              <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
            </svg>
            <span class="topbar__badge-dot"></span>
          </button>

          <button type="button" class="topbar__icon-btn" aria-label="Ayuda">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
              <line x1="12" y1="17" x2="12.01" y2="17"/>
            </svg>
          </button>
        </ng-container>

        <div class="topbar__user">
          <span class="topbar__avatar">{{ userInitials }}</span>
          <span class="topbar__user-name">{{ userName || 'Usuario' }}</span>
        </div>
      </div>
    </header>

    <main class="shell__content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
